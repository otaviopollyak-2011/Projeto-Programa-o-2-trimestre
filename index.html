<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Site Simples</title>
    <style>
        /* Configurações gerais do site */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        /* Alto contraste e destaque no Título Principal */
        h1 {
            color: #ffffff;
            background-color: #1a252f; /* Fundo escuro para dar contraste */
            padding: 15px 20px;
            border-radius: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Estilização dos subtítulos */
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #34495e;
            padding-bottom: 5px;
            margin-top: 30px;
        }

        h3 {
            color: #7f8c8d;
        }

        /* Estilização da caixinha (div) */
        div {
            background-color: #ffffff;
            padding: 20px;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 20px 0;
        }

        /*
