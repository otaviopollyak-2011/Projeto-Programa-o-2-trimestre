<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Site Simples</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            color: #ffffff;
            background-color: #1a252f;
            padding: 15px 20px;
            border-radius: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #34495e;
            padding-bottom: 5px;
            margin-top: 30px;
        }

        h3 {
            color: #7f8c8d;
        }

        div {
            background-color: #ffffff;
            padding: 20px;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 20px 0;
        }
        img{width: 80px;height: 80px;}
    </style>
</head>
<img src="imagem-blog.png" alt="Ícone quadrado com fundo azul escuro exibindo a letra 'A' maiúscula estilizada em formato de constelação tecnológica, formada por linhas e pontos luminosos em neon azul claro. Ao fundo, há detalhes sutis de circuitos eletrônicos e códigos binários.">
<body>
    <h1>Meu Site da Alura.</h1>

    <div>
        <h2>Bem-vindo</h2>
        <p>Meu site da Alura.</p>
    </div>
</body>
</html>
